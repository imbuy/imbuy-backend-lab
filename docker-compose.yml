version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: imbuy
      POSTGRES_USER: imbuy
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
  app:
    build: .
    depends_on: [db]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/imbuy
      SPRING_DATASOURCE_USERNAME: imbuy
      SPRING_DATASOURCE_PASSWORD: secret
    ports:
      - "8080:8080"
volumes:
  db_data:
